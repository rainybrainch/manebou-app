<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coinGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-opacity="0.3" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="transparent"/>

  <circle cx="200" cy="220" r="140" fill="url(#coinGradient)" filter="url(#shadow)"/>
  <ellipse cx="200" cy="150" rx="110" ry="50" fill="#ffffff" opacity="0.35"/>
  <circle cx="200" cy="220" r="140" fill="none" stroke="#d97706" stroke-width="3" opacity="0.2"/>

  <!-- 王冠 -->
  <g filter="url(#glow)">
    <path d="M 150 100 L 160 60 L 175 75 L 200 45 L 225 75 L 240 60 L 250 100 Z"
          fill="#1e3a8a" stroke="#0f172a" stroke-width="2"/>
    <circle cx="160" cy="65" r="6" fill="#f59e0b"/>
    <circle cx="200" cy="50" r="8" fill="#fcd34d"/>
    <circle cx="240" cy="65" r="6" fill="#f59e0b"/>
    <rect x="160" y="95" width="80" height="8" fill="#1e3a8a"/>
  </g>

  <!-- バッジ -->
  <g>
    <rect x="165" y="280" width="70" height="70" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="200" y="330" font-size="50" text-anchor="middle" dominant-baseline="middle">💰</text>
  </g>

  <!-- 左目（やさしく見守る◉） -->
  <g>
    <ellipse cx="160" cy="200" rx="28" ry="32" fill="#ffffff" stroke="#333333" stroke-width="2"/>
    <circle cx="160" cy="208" r="19" fill="#1f2937"/>
    <circle cx="166" cy="198" r="8" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- 右目（やさしく見守る◉） -->
  <g>
    <ellipse cx="240" cy="200" rx="28" ry="32" fill="#ffffff" stroke="#333333" stroke-width="2"/>
    <circle cx="240" cy="208" r="19" fill="#1f2937"/>
    <circle cx="246" cy="198" r="8" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- 眉毛（上昇だが優しい） -->
  <g>
    <path d="M 135 175 Q 160 165 185 175" stroke="#333333" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 215 175 Q 240 165 265 175" stroke="#333333" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 鼻 -->
  <circle cx="200" cy="225" r="5" fill="#f59e0b" opacity="0.6"/>

  <!-- 口（教える笑み） -->
  <g>
    <path d="M 175 255 Q 200 272 225 255" stroke="#f59e0b" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 175 255 Q 200 270 225 255" stroke="#fb923c" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 左腕（本を持つ） -->
  <g>
    <!-- 腕 -->
    <rect x="60" y="240" width="80" height="40" rx="20" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <!-- 本（青いブック） -->
    <g transform="translate(120, 230)">
      <rect x="0" y="0" width="50" height="60" rx="3" fill="#1e3a8a" stroke="#0f172a" stroke-width="2"/>
      <line x1="25" y1="5" x2="25" y2="55" stroke="#f59e0b" stroke-width="1"/>
      <line x1="5" y1="15" x2="45" y2="15" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
      <line x1="5" y1="25" x2="45" y2="25" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    </g>
  </g>

  <!-- 右腕（説明するジェスチャー） -->
  <g>
    <path d="M 300 220 Q 330 200 360 180" stroke="#f59e0b" stroke-width="35" fill="none" stroke-linecap="round"/>
    <circle cx="360" cy="175" r="28" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <circle cx="358" cy="170" r="8" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- 左足 -->
  <g>
    <rect x="150" y="350" width="50" height="50" rx="15" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <circle cx="165" cy="385" r="5" fill="#ffffff" opacity="0.3"/>
    <circle cx="180" cy="387" r="5" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- 右足 -->
  <g>
    <rect x="200" y="350" width="50" height="50" rx="15" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <circle cx="215" cy="385" r="5" fill="#ffffff" opacity="0.3"/>
    <circle cx="230" cy="387" r="5" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- 装飾: ペンと思考 -->
  <g opacity="0.7" filter="url(#glow)">
    <text x="70" y="120" font-size="32">📚</text>
    <text x="320" y="280" font-size="32">✏️</text>
  </g>
</svg>