<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coinGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-opacity="0.3" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="transparent"/>

  <circle cx="200" cy="220" r="140" fill="url(#coinGradient)" filter="url(#shadow)"/>
  <ellipse cx="200" cy="150" rx="110" ry="50" fill="#ffffff" opacity="0.35"/>
  <circle cx="200" cy="220" r="140" fill="none" stroke="#d97706" stroke-width="3" opacity="0.2"/>

  <!-- 王冠 -->
  <g filter="url(#glow)">
    <path d="M 150 100 L 160 60 L 175 75 L 200 45 L 225 75 L 240 60 L 250 100 Z"
          fill="#1e3a8a" stroke="#0f172a" stroke-width="2"/>
    <circle cx="160" cy="65" r="6" fill="#f59e0b"/>
    <circle cx="200" cy="50" r="8" fill="#fcd34d"/>
    <circle cx="240" cy="65" r="6" fill="#f59e0b"/>
    <rect x="160" y="95" width="80" height="8" fill="#1e3a8a"/>
  </g>

  <!-- バッジ -->
  <g>
    <rect x="165" y="280" width="70" height="70" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="200" y="330" font-size="50" text-anchor="middle" dominant-baseline="middle">💰</text>
  </g>

  <!-- 左目（大きく驚く〇） -->
  <g>
    <ellipse cx="160" cy="200" rx="35" ry="42" fill="#ffffff" stroke="#333333" stroke-width="2"/>
    <circle cx="160" cy="210" r="24" fill="#1f2937"/>
    <circle cx="168" cy="200" r="10" fill="#ffffff"/>
  </g>

  <!-- 右目（大きく驚く〇） -->
  <g>
    <ellipse cx="240" cy="200" rx="35" ry="42" fill="#ffffff" stroke="#333333" stroke-width="2"/>
    <circle cx="240" cy="210" r="24" fill="#1f2937"/>
    <circle cx="248" cy="200" r="10" fill="#ffffff"/>
  </g>

  <!-- 眉毛（上昇 - 驚き） -->
  <g>
    <path d="M 120 160 Q 160 140 200 160" stroke="#333333" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 200 160 Q 240 140 280 160" stroke="#333333" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 鼻 -->
  <circle cx="200" cy="225" r="5" fill="#f59e0b" opacity="0.6"/>

  <!-- 口（びっくり - O型） -->
  <g>
    <ellipse cx="200" cy="265" rx="18" ry="22" fill="#1f2937" stroke="#fb923c" stroke-width="2"/>
  </g>

  <!-- 左腕（上げる） -->
  <g>
    <line x1="100" y1="210" x2="120" y2="90" stroke="#f59e0b" stroke-width="32" stroke-linecap="round"/>
    <circle cx="115" cy="85" r="32" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
  </g>

  <!-- 右腕（上げる） -->
  <g>
    <line x1="300" y1="210" x2="280" y2="90" stroke="#f59e0b" stroke-width="32" stroke-linecap="round"/>
    <circle cx="285" cy="85" r="32" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
  </g>

  <!-- 左足 -->
  <g>
    <rect x="150" y="350" width="50" height="50" rx="15" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <circle cx="165" cy="385" r="5" fill="#ffffff" opacity="0.3"/>
    <circle cx="180" cy="387" r="5" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- 右足 -->
  <g>
    <rect x="200" y="350" width="50" height="50" rx="15" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <circle cx="215" cy="385" r="5" fill="#ffffff" opacity="0.3"/>
    <circle cx="230" cy="387" r="5" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- 装飾: 衝撃 -->
  <g opacity="0.8" filter="url(#glow)">
    <text x="80" y="110" font-size="40">💡</text>
    <text x="320" y="140" font-size="40">💫</text>
  </g>
</svg>