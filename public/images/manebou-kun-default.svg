<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- グラデーション定義 -->
    <radialGradient id="coinGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </radialGradient>

    <!-- シャドウ定義 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-opacity="0.3" />
    </filter>

    <!-- グロー定義 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景（オプション） -->
  <rect width="400" height="400" fill="transparent"/>

  <!-- 本体: コイン形 -->
  <circle cx="200" cy="220" r="140" fill="url(#coinGradient)" filter="url(#shadow)"/>

  <!-- 3D効果: 上部ハイライト -->
  <ellipse cx="200" cy="150" rx="110" ry="50" fill="#ffffff" opacity="0.35"/>

  <!-- 3D効果: 側面ライン（立体感） -->
  <circle cx="200" cy="220" r="140" fill="none" stroke="#d97706" stroke-width="3" opacity="0.2"/>

  <!-- 王冠 -->
  <g filter="url(#glow)">
    <!-- 王冠ベース -->
    <path d="M 150 100 L 160 60 L 175 75 L 200 45 L 225 75 L 240 60 L 250 100 Z"
          fill="#1e3a8a" stroke="#0f172a" stroke-width="2"/>

    <!-- 王冠の装飾（金色） -->
    <circle cx="160" cy="65" r="6" fill="#f59e0b"/>
    <circle cx="200" cy="50" r="8" fill="#fcd34d"/>
    <circle cx="240" cy="65" r="6" fill="#f59e0b"/>

    <!-- 王冠の接続部 -->
    <rect x="160" y="95" width="80" height="8" fill="#1e3a8a" stroke="#0f172a" stroke-width="1"/>
  </g>

  <!-- 胸のバッジ -->
  <g>
    <rect x="165" y="280" width="70" height="70" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="200" y="330" font-size="50" text-anchor="middle" dominant-baseline="middle">💰</text>
  </g>

  <!-- 左目 -->
  <g>
    <!-- 目の白 -->
    <ellipse cx="160" cy="200" rx="28" ry="32" fill="#ffffff" stroke="#333333" stroke-width="2"/>

    <!-- 瞳（半月形 - やさしさ） -->
    <path d="M 145 200 Q 160 185 175 200 Q 160 205 145 200 Z" fill="#1f2937"/>

    <!-- ハイライト -->
    <circle cx="168" cy="195" r="6" fill="#ffffff"/>
  </g>

  <!-- 右目 -->
  <g>
    <!-- 目の白 -->
    <ellipse cx="240" cy="200" rx="28" ry="32" fill="#ffffff" stroke="#333333" stroke-width="2"/>

    <!-- 瞳（半月形 - やさしさ） -->
    <path d="M 225 200 Q 240 185 255 200 Q 240 205 225 200 Z" fill="#1f2937"/>

    <!-- ハイライト -->
    <circle cx="248" cy="195" r="6" fill="#ffffff"/>
  </g>

  <!-- 眉毛（水平 - リラックス） -->
  <g>
    <!-- 左眉 -->
    <path d="M 135 175 Q 160 170 185 175" stroke="#333333" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- 右眉 -->
    <path d="M 215 175 Q 240 170 265 175" stroke="#333333" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 小さい鼻 -->
  <circle cx="200" cy="225" r="5" fill="#f59e0b" opacity="0.6"/>

  <!-- 口（微笑み - ∧型） -->
  <g>
    <!-- 口のラインと塗り -->
    <path d="M 175 250 Q 200 270 225 250"
          stroke="#f59e0b" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- 内側の塗り（ほのかな赤） -->
    <path d="M 175 250 Q 200 268 225 250"
          stroke="#fb923c" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 左腕 -->
  <g>
    <!-- 腕本体 -->
    <rect x="50" y="240" width="90" height="45" rx="22" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>

    <!-- 手（丸い手袋） -->
    <circle cx="50" cy="262" r="28" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <circle cx="52" cy="258" r="8" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- 右腕 -->
  <g>
    <!-- 腕本体 -->
    <rect x="260" y="240" width="90" height="45" rx="22" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>

    <!-- 手（丸い手袋） -->
    <circle cx="350" cy="262" r="28" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <circle cx="348" cy="258" r="8" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- 左足 -->
  <g>
    <!-- 足本体 -->
    <rect x="150" y="350" width="50" height="50" rx="15" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>

    <!-- 足の指 -->
    <circle cx="165" cy="385" r="5" fill="#ffffff" opacity="0.3"/>
    <circle cx="180" cy="387" r="5" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- 右足 -->
  <g>
    <!-- 足本体 -->
    <rect x="200" y="350" width="50" height="50" rx="15" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>

    <!-- 足の指 -->
    <circle cx="215" cy="385" r="5" fill="#ffffff" opacity="0.3"/>
    <circle cx="230" cy="387" r="5" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- 装飾: 周辺の光（光の玉） -->
  <g opacity="0.15" filter="url(#glow)">
    <circle cx="80" cy="120" r="30" fill="#f59e0b"/>
    <circle cx="320" cy="140" r="20" fill="#10b981"/>
    <circle cx="350" cy="280" r="25" fill="#f59e0b"/>
  </g>
</svg>